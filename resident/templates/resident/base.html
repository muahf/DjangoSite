{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Umbrella Lab{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/umbrella.css' %}">
</head>
<body>

<!-- HEADER -->
<header class="navbar">
    <div class="container navbar-inner">
        <a href="{% url 'resident:home' %}" class="navbar-brand">
            🧬 UMBRELLA LAB
        </a>

        <nav>
            <ul class="navbar-nav">
                <li>
                    <a class="nav-link" href="{% url 'resident:pathogen' %}">
                        🦠 Патогены  
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="{% url 'resident:researcher' %}">
                        👨‍🔬 Исследователи  
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<!-- HERO (можно переиспользовать на главной) -->
{% block hero %}
{% endblock %}
<!-- LABORATORY BLOCK -->
{% block lab %}{% endblock %}

<!-- MAIN CONTENT -->
<main class="container main-content">
    {% block content %}
    {% endblock %}
</main>

<!-- FOOTER -->
<footer class="footer">
    <div class="container footer-inner">
        <div>
            &copy; {{ year|default:2026 }} Umbrella Corporation
        </div>
        <div class="footer-right">
            Секретное исследовательское подразделение
        </div>
    </div>
</footer>

</body>
</html>
